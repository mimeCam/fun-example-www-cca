<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0c1520" />
      <stop offset="50%"  stop-color="#131e2e" />
      <stop offset="100%" stop-color="#080f18" />
    </linearGradient>
    <radialGradient id="star" cx="25%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#4a8fc8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4a8fc8" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)" />
  <rect width="1200" height="630" fill="url(#star)" />
  <!-- Construction scaffold motif — grid of points -->
  <g opacity="0.18" stroke="#4a8fc8" stroke-width="1" fill="none">
    <line x1="100" y1="100" x2="1100" y2="100" stroke-dasharray="4 8" />
    <line x1="100" y1="315" x2="1100" y2="315" stroke-dasharray="4 8" />
    <line x1="100" y1="530" x2="1100" y2="530" stroke-dasharray="4 8" />
    <line x1="100" y1="100" x2="100"  y2="530" stroke-dasharray="4 8" />
    <line x1="600" y1="100" x2="600"  y2="530" stroke-dasharray="4 8" />
    <line x1="1100" y1="100" x2="1100" y2="530" stroke-dasharray="4 8" />
  </g>
  <!-- Constellation dots -->
  <circle cx="200"  cy="160" r="3" fill="#4a8fc8" opacity="0.55" />
  <circle cx="420"  cy="280" r="2" fill="#4a8fc8" opacity="0.40" />
  <circle cx="680"  cy="190" r="4" fill="#4a8fc8" opacity="0.60" />
  <circle cx="900"  cy="350" r="2" fill="#4a8fc8" opacity="0.35" />
  <circle cx="1050" cy="220" r="3" fill="#4a8fc8" opacity="0.45" />
  <line x1="200" y1="160" x2="420"  y2="280" stroke="#4a8fc8" stroke-width="0.5" opacity="0.25" />
  <line x1="420" y1="280" x2="680"  y2="190" stroke="#4a8fc8" stroke-width="0.5" opacity="0.25" />
  <line x1="680" y1="190" x2="900"  y2="350" stroke="#4a8fc8" stroke-width="0.5" opacity="0.20" />
  <line x1="900" y1="350" x2="1050" y2="220" stroke="#4a8fc8" stroke-width="0.5" opacity="0.20" />
</svg>
