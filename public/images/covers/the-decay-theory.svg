<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1208" />
      <stop offset="40%"  stop-color="#2e1e0a" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#c8820a" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c8820a" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <!-- grain texture simulation via layered circles -->
  <circle cx="200"  cy="120" r="180" fill="#c8820a" opacity="0.04" />
  <circle cx="900"  cy="500" r="140" fill="#c8820a" opacity="0.03" />
  <circle cx="600"  cy="315" r="320" fill="#c8820a" opacity="0.02" />
  <!-- Hourglass / decay motif -->
  <g transform="translate(540,215)" opacity="0.22">
    <polygon points="120,0 0,200 240,200" fill="none" stroke="#c8820a" stroke-width="1.5" />
    <polygon points="0,0   240,0 120,200" fill="none" stroke="#c8820a" stroke-width="1.5" />
    <line x1="0" y1="0" x2="240" y2="0"   stroke="#c8820a" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="200" x2="240" y2="200" stroke="#c8820a" stroke-width="1" opacity="0.5" />
  </g>
</svg>
